<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數綿羊 - 放鬆助眠</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container" role="main">
    <button id="settingsToggle" class="gear-btn" type="button" aria-expanded="false" aria-controls="settingsCard"
      aria-label="開啟設定">&#9881;</button>

    <h1 id="titleText">數綿羊</h1>
    <p id="subtitleText" class="subtitle">用穩定節奏數綿羊，幫助放鬆入睡</p>

    <section class="counter" aria-live="polite" aria-atomic="true">
      <span id="count" class="count-value">0</span>
      <span id="countLabel" class="label">隻綿羊</span>
    </section>

    <section class="sheep-display" id="sheepDisplay" aria-label="綿羊動畫區">
      <div id="sheep" class="sheep" aria-hidden="true">&#128017;</div>
    </section>

    <section class="controls" aria-label="播放控制">
      <button id="startBtn" class="btn primary" type="button">開始</button>
      <button id="pauseBtn" class="btn" type="button" disabled>暫停</button>
      <button id="resetBtn" class="btn" type="button">重設</button>
    </section>

    <aside id="settingsCard" class="settings-card" aria-label="設定卡片" hidden>
      <section class="settings" aria-label="設定">
        <label class="setting-row" for="uiLangSelect">
          <span id="uiLangLabel">介面語言</span>
          <select id="uiLangSelect">
            <option value="zh-TW">中文（台灣）</option>
            <option value="zh-CN">中文（&#31616;体）</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </label>

        <label class="setting-row" for="sheepTypeSelect">
          <span id="sheepTypeLabel">綿羊種類</span>
          <select id="sheepTypeSelect"></select>
        </label>

        <label class="setting-row" for="speedRange">
          <span id="speedLabel">每隻間隔（秒）</span>
          <input type="range" id="speedRange" min="0.5" max="5" step="0.5" value="2">
          <span id="speedValue">2.0</span>
        </label>

        <label class="setting-row" for="voiceToggle">
          <span id="voiceToggleLabel">語音朗讀</span>
          <input type="checkbox" id="voiceToggle">
        </label>

        <label class="setting-row" for="voiceSelect">
          <span id="voiceLangLabel">語音語言</span>
          <select id="voiceSelect">
            <option value="zh-TW">中文（台灣）</option>
            <option value="zh-CN">中文（中國）</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </label>

        <div class="setting-row fade-out-row">
          <label id="fadeOutToggleLabel" for="fadeOutToggle">啟用漸弱</label>
          <input type="checkbox" id="fadeOutToggle">
          <span id="fadeDurationLabel">時長</span>
          <div class="fade-buttons" role="group" aria-label="漸弱預設時長">
            <button class="fade-btn" type="button" data-seconds="30">30秒</button>
            <button class="fade-btn" type="button" data-seconds="60">1分</button>
            <button class="fade-btn" type="button" data-seconds="180">3分</button>
            <button class="fade-btn" type="button" data-seconds="600">10分</button>
            <button class="fade-btn" type="button" data-seconds="1800">30分</button>
            <button class="fade-btn" type="button" data-seconds="3600">1小時</button>
          </div>
          <input type="number" id="fadeOutInput" min="1" max="3600" step="1" value="30" aria-label="漸弱秒數">
          <span id="secondsSuffix">秒</span>
        </div>
      </section>
    </aside>

    <p id="hintText" class="hint">提示：開啟語音後可搭配漸弱，讓朗讀音量逐步下降。</p>
  </main>

  <script src="script.js"></script>
</body>

</html>
